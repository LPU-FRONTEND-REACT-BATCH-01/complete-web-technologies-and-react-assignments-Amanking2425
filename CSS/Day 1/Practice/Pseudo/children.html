<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h2:first-child{
            background-color: yellowgreen;
        }
        li:first-of-type{
            background-color: orangered;
        }
        li:last-of-type{
            background-color: brown;
        }
        p:first-child{
            background-color: aqua;
            color: red;
        }
        li:nth-of-type(3){
            background-color: navy;
        }
    </style>
</head>
<body>
    <ul>
        <h2>List of bikes</h2>
        <li>Royal Enfield</li>
        <li>Lord Splender</li>
        <li>KTM</li>
        <li>Pulser</li>
        <li>Apache</li>
        
        <h2>List of Cars</h2>
        <li>Audi</li>
        <li>Frotuner</li>
        <li><p>Rolls Royals</p></li>
        <li>Mahindra Scorpio</li>
    </ul>
    
</body>
</html>
