<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: #23272f; /* Dark theme background */
            color: #f6f7f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Navigation Bar --- */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 16px;
            background-color: #23272f;
            border-bottom: 1px solid #343a46;
            position: sticky;
            top: 0;
        }

        /* Left Side: Logo & Version */
        .nav-left {
            display: flex;
            align-items: center;
            flex-shrink: 0; /* Prevent shrinking */
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .react-logo {
            color: #58c4dc;
            width: 36px;
            height: 36px;
            margin-right: 8px;
        }

        .version {
            color: #99a1b3;
            font-size: 15px;
            font-weight: 500;
        }

        /* Center Side: Search Bar */
        .search-container {
            flex: 1; /* Takes up all available remaining space */
            display: flex;
            justify-content: flex-start;
            padding: 0 24px; /* Creates the gap between left/right items */
        }

        .search-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #343a46;
            border: 1px solid transparent;
            border-radius: 9999px; /* Pill shape */
            padding: 0 12px 0 16px;
            height: 40px;
            width: 100%; /* Stretches to fill container */
            color: #99a1b3;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .search-button:hover {
            border-color: #58c4dc;
            background-color: #404756;
        }

        .search-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .search-shortcut {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .shortcut-key {
            background-color: #23272f;
            border: 1px solid #404756;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 12px;
            font-family: monospace;
            font-weight: 600;
            color: #99a1b3;
        }

        /* Right Side: Links & Icons */
        .nav-right {
            display: flex;
            align-items: center;
            flex-shrink: 0; /* Prevent shrinking */
            gap: 32px; /* Space between text links and icon group */
        }

        .nav-links {
            display: flex;
            gap: 24px; /* Space between individual links */
        }

        .nav-links a {
            color: #f6f7f9;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600; /* Made slightly bolder to match original */
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #58c4dc;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 16px; /* Space between icons */
        }

        .icon-btn {
            background: none;
            border: none;
            color: #e6e6e6;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .icon-btn:hover {
            color: #58c4dc;
        }

        /* --- Hero Section (Included for full page context) --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 80px;
        }

        .hero-logo {
            color: #58c4dc;
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 28px;
            color: #e6e6e6;
            font-weight: 400;
            margin-bottom: 48px;
            text-align: center;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            height: 52px;
            border-radius: 9999px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #58c4dc;
            color: #000000;
            border: none;
        }

        .btn-primary:hover {
            background-color: #61dafb;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: #f6f7f9;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="#" class="logo-container">
                <svg class="react-logo" viewBox="-11.5 -10.23174 23 20.46348">
                    <circle cx="0" cy="0" r="2.05" fill="currentColor"/>
                    <g stroke="currentColor" stroke-width="1" fill="none">
                        <ellipse rx="11" ry="4.2"/>
                        <ellipse rx="11" ry="4.2" transform="rotate(60)"/>
                        <ellipse rx="11" ry="4.2" transform="rotate(120)"/>
                    </g>
                </svg>
                <span class="version">v19.2</span>
            </a>
        </div>

        <div class="search-container">
            <button class="search-button">
                <div class="search-left">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <span>Search</span>
                </div>
                <div class="search-shortcut">
                    <span class="shortcut-key">Ctrl</span>
                    <span class="shortcut-key">K</span>
                </div>
            </button>
        </div>

        <div class="nav-right">
            <div class="nav-links">
                <a href="#">Learn</a>
                <a href="#">Reference</a>
                <a href="#">Community</a>
                <a href="#">Blog</a>
            </div>
            
            <div class="nav-icons">
                <button class="icon-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"/>
                    </svg>
                </button>
                <button class="icon-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
                    </svg>
                </button>
                <button class="icon-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1.27a11 11 0 00-3.48 21.46c.55.09.73-.28.73-.55v-1.84c-3.03.64-3.67-1.46-3.67-1.46-.55-1.29-1.28-1.65-1.28-1.65-.92-.65.1-.65.1-.65 1.1.09 1.73 1.1 1.73 1.1.92 1.65 2.57 1.2 3.21.92a2 2 0 01.64-1.47c-2.47-.27-5.04-1.19-5.04-5.5 0-1.1.46-2.1 1.2-2.84a3.76 3.76 0 010-2.93s.91-.28 3.11 1.1c1.8-.49 3.7-.49 5.5 0 2.1-1.38 3.02-1.1 3.02-1.1a3.76 3.76 0 010 2.93c.83.74 1.2 1.74 1.2 2.94 0 4.21-2.57 5.13-5.04 5.4.45.37.82.92.82 2.02v3.03c0 .27.1.64.73.55A11 11 0 0012 1.27"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <svg class="hero-logo" viewBox="-11.5 -10.23174 23 20.46348">
            <circle cx="0" cy="0" r="2.05" fill="currentColor"/>
            <g stroke="currentColor" stroke-width="1" fill="none">
                <ellipse rx="11" ry="4.2"/>
                <ellipse rx="11" ry="4.2" transform="rotate(60)"/>
                <ellipse rx="11" ry="4.2" transform="rotate(120)"/>
            </g>
        </svg>

        <h1>React</h1>
        <p class="subtitle">The library for web and native user interfaces</p>

        <div class="hero-buttons">
            <a href="#" class="btn btn-primary">Learn React</a>
            <a href="#" class="btn btn-secondary">API Reference</a>
        </div>
    </main>

</body>
</html>
