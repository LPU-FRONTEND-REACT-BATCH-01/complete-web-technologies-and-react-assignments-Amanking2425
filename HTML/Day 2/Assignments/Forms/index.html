<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Hotel Management System</h2>
    <label for="firstName">FirstName:</label>
    <input type="text" id="firstName"><br><br>

    <label for="lastName">LastName:</label>
    <input type="text" id="lastName"><br><br>
    <label for="gender">Gender:</label>
    Male<input type="radio" name="gender">
    Female <input type="radio" name="gender"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email"><br><br>

    <label>Room Type:</label>
    <select name="room" id="room">
        <option value="">--Select Room--</option>
        <option value="Single">Single</option>
        <option value="Double">Double</option>
        <option value="Delux">Delux</option>
        <option value="Luxirious">Luxirious</option>
    </select><br><br>

    <label for="guests">Number of Guests:</label>
    <input type="number" id="guests" min="1" max="10"><br><br>

    <label for="arrivalDate">Arrival Date:</label>
    <input type="date" id="arrivalDate"><br><br>

    <label for="arrivalTime">Arrival Time:</label>
    <input type="time" id="arrivalTime"><br><br>

    <label for="departureDate">Departure Date:</label>
    <input type="date" id="departureDate"><br><br>

    <label for="city">City:</label>
    <select name="city" id="city">
        <option value="">--Select City--</option>
        <option value="Delhi">Delhi</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Bangalore">Bangalore</option>
        <option value="Hyderabad">Hyderabad</option>
        <option value="Chennai">Chennai</option>
    </select><br><br>

    <input type="checkbox" id="terms" name="terms">
    <label for="terms">I agree to the terms and conditions</label><br><br>

    <label for="message">Special Message</label>
    <textarea name="" id="message" placeholder="feedback"></textarea><br><br>
    <input type="submit" value="Book Room">
</html>
